name: Cross-Compile Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  BIN_NAME: fokbomb

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          [
            x86_64-unknown-linux-gnu,
            aarch64-unknown-linux-gnu,
            x86_64-pc-windows-gnu,
          ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Cross
        shell: bash
        run: |
          curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin

      - name: Compile Binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare Artifact
        shell: bash
        run: |
          EXT=""
          [[ "${{ matrix.target }}" == *"windows"* ]] && EXT=".exe"

          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ env.BIN_NAME }}$EXT" "dist/${{ env.BIN_NAME }}-${{ matrix.target }}$EXT"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'manual-build' }}
          files: release-artifacts/*
          generate_release_notes: true
